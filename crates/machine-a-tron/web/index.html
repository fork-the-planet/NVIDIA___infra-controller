<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>machine-a-tron machines</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f5f2;
      --fg: #111111;
      --muted: #5f666d;
      --line: #d7d9d2;
      --panel: #ffffff;
      --panel-alt: #f8f9f6;
      --accent: #76b900;
      --accent-fg: #172400;
      --warn: #b15c00;
      --error: #c21f32;
      --header-bg: #111111;
      --header-fg: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0c0d;
        --fg: #f5f7f2;
        --muted: #aeb5aa;
        --line: #30352d;
        --panel: #151713;
        --panel-alt: #1b1f18;
        --accent: #76b900;
        --accent-fg: #f5ffe4;
        --warn: #ffb84d;
        --error: #ff6b7a;
        --header-bg: #050505;
        --header-fg: #ffffff;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: auto;
      margin: 16px;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      color: var(--fg);
    }

    .meta {
      color: var(--muted);
      white-space: nowrap;
    }

    .error {
      display: none;
      margin-bottom: 12px;
      padding: 8px 10px;
      border: 1px solid color-mix(in srgb, var(--error), transparent 55%);
      color: var(--error);
      background: color-mix(in srgb, var(--error), transparent 92%);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-top: 3px solid var(--accent);
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 1040px;
    }

    .col-machine {
      width: 27%;
    }

    .col-hardware {
      width: 14%;
    }

    .col-state {
      width: 12%;
    }

    .col-power {
      width: 8%;
    }

    .col-ip {
      width: 10%;
    }

    .col-bmc {
      width: 9%;
    }

    .col-redfish {
      width: 8%;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }

    th {
      color: var(--header-fg);
      background: var(--header-bg);
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
    }

    tbody tr:nth-child(even) {
      background: var(--panel-alt);
    }

    tbody tr:hover {
      background: color-mix(in srgb, var(--accent), var(--panel) 88%);
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .machine {
      font-weight: 650;
      color: var(--accent);
    }

    .dpu .machine {
      padding-left: 18px;
      color: color-mix(in srgb, var(--accent), var(--muted) 35%);
    }

    .state {
      display: inline-block;
      max-width: 100%;
      padding: 2px 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: color-mix(in srgb, var(--panel), var(--line) 24%);
      line-height: 1.25;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .state.on,
    .state.available,
    .state.running {
      border-color: color-mix(in srgb, var(--accent), transparent 35%);
      color: var(--accent-fg);
      background: color-mix(in srgb, var(--accent), var(--panel) 78%);
    }

    .state.warning,
    .state.powercycling {
      border-color: color-mix(in srgb, var(--warn), transparent 50%);
      color: var(--warn);
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      text-align: center;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    @media (max-width: 700px) {
      main {
        margin: 10px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .meta {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>machine-a-tron machines</h1>
      <div class="meta"><span id="count">0</span> machines | <span id="updated">not loaded</span></div>
    </header>
    <div id="error" class="error"></div>
    <div id="content" class="empty">Loading machines</div>
  </main>

  <script>
    const content = document.getElementById("content");
    const count = document.getElementById("count");
    const updated = document.getElementById("updated");
    const error = document.getElementById("error");

    function text(value) {
      return value === undefined || value === null || value === "" ? "-" : String(value);
    }

    function html(value) {
      return text(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      })[ch]);
    }

    function stateClass(value) {
      return text(value).toLowerCase().replace(/[^a-z0-9]+/g, "");
    }

    function endpoint(endpoint) {
      if (!endpoint) {
        return "-";
      }
      return `${text(endpoint.reachable_port)} -> ${text(endpoint.listen_port)}`;
    }

    function flatten(machine, depth = 0) {
      const rows = [{ machine, depth }];
      for (const dpu of machine.dpus || []) {
        rows.push(...flatten(dpu, depth + 1));
      }
      return rows;
    }

    function render(data) {
      const machines = data.machines || [];
      const rows = machines.flatMap((machine) => flatten(machine));
      count.textContent = machines.length;
      updated.textContent = new Date().toLocaleTimeString();

      if (rows.length === 0) {
        content.className = "empty";
        content.textContent = "No machines";
        return;
      }

      content.className = "table-wrap";
      content.innerHTML = `
        <table>
          <colgroup>
            <col class="col-machine">
            <col class="col-hardware">
            <col class="col-state">
            <col class="col-state">
            <col class="col-power">
            <col class="col-ip">
            <col class="col-bmc">
            <col class="col-redfish">
          </colgroup>
          <thead>
            <tr>
              <th>Machine</th>
              <th>Hardware</th>
              <th>MAT</th>
              <th>API</th>
              <th>Power</th>
              <th>Machine IP</th>
              <th>BMC IP</th>
              <th>Redfish</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(({ machine, depth }) => `
              <tr class="${depth > 0 ? "dpu" : ""}">
                <td class="machine"><code>${html(machine.machine_id || machine.mat_id)}</code></td>
                <td>${depth > 0 ? "DPU" : html(machine.hardware_type)}</td>
                <td><span class="state ${stateClass(machine.mat_state)}">${html(machine.mat_state)}</span></td>
                <td><span class="state ${stateClass(machine.api_state)}">${html(machine.api_state)}</span></td>
                <td><span class="state ${stateClass(machine.power_state)}">${html(machine.power_state)}</span></td>
                <td><code>${html(machine.machine_ip)}</code></td>
                <td><code>${html(machine.bmc && machine.bmc.ip)}</code></td>
                <td><code>${html(endpoint(machine.bmc && machine.bmc.redfish))}</code></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    async function refresh() {
      try {
        const response = await fetch("/machines/status", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        render(await response.json());
        error.style.display = "none";
      } catch (e) {
        error.textContent = `Failed to load machine status: ${e.message}`;
        error.style.display = "block";
      }
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
